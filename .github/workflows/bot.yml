name: CryptoDzen Bot
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  post_news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: |
          pip install requests feedparser google-generativeai
          python bot.py
      # Сохраняем список опубликованных новостей
      - name: Commit posted links
        run: |
          git config --global user.name 'bot'
          git config --global user.email 'bot@bot.com'
          git add posted_links.txt || true
          git commit -m "Update posted links" || true
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
