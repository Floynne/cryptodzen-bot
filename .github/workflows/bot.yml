name: CryptoDzen Bot

on:
  schedule:
    - cron: '0 * * * *' # Запуск каждый час
  workflow_dispatch:     # Кнопка для ручного запуска

jobs:
  post_news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser google-generativeai

      - name: Run bot
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHANNEL: ${{ secrets.TG_CHANNEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py

      - name: Commit posted links
        run: |
          git config --global user.name 'bot'
          git config --global user.email 'bot@bot.com'
          # Добавляем файл в индекс, если он изменился
          git add posted_links.txt || true
          # Проверяем, есть ли что коммитить
          if git diff --quiet && git diff --cached --quiet; then
            echo "Нет изменений в списке ссылок."
          else
            git commit -m "Update posted links"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
